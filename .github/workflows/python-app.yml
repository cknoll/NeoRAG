# This workflow will install Python dependencies, run tests with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: CI

on:
  push:
    branches:
    - main
    - develop
  pull_request:
    branches:
    - main
    - develop

jobs:
  build:

    runs-on: ubuntu-latest

    env:
      # note: 'true' only works if no error occurred.
      # DEBUG_WITH_SSH: 'true'
      DEBUG_WITH_SSH: false


    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"

    # we use uv because it is much faster than normal pip
    - name: Install uv
      run: |
        python -m pip install uv

    - name: install requirements
      run: |
        pwd
        uv pip install --system -r requirements.txt

    - name: install this package
      run: |
        pwd
        uv pip install --system -e .

    - name: bootstrap directories (and data)
      run: |
        neorag --bootstrap



    # experience: a successful connection seems to require that one connects fast after the server waits for it
    # if the server e.g. waits for 2min the log messages indicate waiting but connection cannot be established
    - name: Setup tmate session
      if: env.DEBUG_WITH_SSH == 'true'
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: false

    - name: run tests
      run: |
        pytest -q
